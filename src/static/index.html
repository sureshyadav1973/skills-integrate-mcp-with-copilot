<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="auth-controls">
        <button id="teacher-login-toggle" class="small-button" type="button">
          Teacher Login
        </button>
        <button id="teacher-logout" class="small-button hidden" type="button">
          Logout
        </button>
      </div>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <p id="teacher-status" class="teacher-status">Viewing as student</p>
    </header>

    <div id="login-modal" class="modal hidden">
      <div class="modal-content">
        <h3>Teacher Login</h3>
        <form id="teacher-login-form">
          <div class="form-group">
            <label for="teacher-username">Username:</label>
            <input type="text" id="teacher-username" required />
          </div>
          <div class="form-group">
            <label for="teacher-password">Password:</label>
            <input type="password" id="teacher-password" required />
          </div>
          <div class="modal-actions">
            <button type="submit">Login</button>
            <button id="teacher-login-cancel" type="button" class="secondary-button">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Register Student (Teachers Only)</h3>
        <p class="helper-text">Students can view registrations, but only logged-in teachers can update them.</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
